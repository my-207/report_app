<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年度检查报告自动填充 - 数字员工</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-brand">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span class="nav-title">年度检查报告自动填充</span>
        <span class="badge">数字员工</span>
      </div>
      <div class="nav-actions">
        <span class="nav-mode-badge">子树复制模式</span>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content">
    <div class="container">
      <!-- 步骤说明 -->
      <div class="steps-bar">
        <div class="step active" id="step1-indicator">
          <div class="step-circle">1</div>
          <span class="step-label">上传文件</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step2-indicator">
          <div class="step-circle">2</div>
          <span class="step-label">数据预览</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step3-indicator">
          <div class="step-circle">3</div>
          <span class="step-label">填充打包</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step4-indicator">
          <div class="step-circle">4</div>
          <span class="step-label">下载报告</span>
        </div>
      </div>

      <!-- 上传区域：三卡片双源模式 -->
      <div class="upload-section" id="uploadSection">
        <div class="upload-cards-three">
          <!-- 卡片1：模板上传 -->
          <div class="upload-card" id="templateCard">
            <div class="card-type-badge">必填</div>
            <div class="upload-dropzone" id="templateDropzone">
              <div class="upload-icon">
                <svg viewBox="0 0 48 48" fill="none">
                  <rect x="6" y="6" width="36" height="36" rx="4" stroke="#2563EB" stroke-width="2" fill="none"/>
                  <path d="M6 14h36M14 6v8M14 28l8-8 8 8" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </div>
              <h3 class="upload-title">📋 Word 模板</h3>
              <p class="upload-desc">点击或拖拽上传 .docx 模板文件</p>
              <p class="upload-hint">支持 WPS / Microsoft Word 格式</p>
              <input type="file" id="templateInput" accept=".docx" hidden>
            </div>
            <div class="upload-ready hidden" id="templateReady">
              <div class="ready-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5">
                  <path d="M20 6L9 17l-5-5"/>
                </svg>
              </div>
              <p class="ready-name" id="templateFileName"></p>
              <p class="ready-size" id="templateFileSize"></p>
              <button class="btn-remove" onclick="removeTemplate()" title="移除">✕</button>
            </div>
          </div>

        </div>
      </div>

      <!-- 实采数据上传/填充操作区 -->
      <section class="template-structure-section hidden" id="templateStructureSection">
        <div class="ts-header">
          <div class="ts-actions">
            <input type="file" id="realDataInput" accept=".json" hidden>
            <button class="btn btn-sm btn-outline" id="tsRealDataUploadBtn" onclick="document.getElementById('realDataInput').click()" disabled title="下载样例JSON编辑后上传实采数据">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              上传实采JSON
            </button>
            <button class="btn btn-sm btn-success" id="tsRealFillBtn" onclick="startRealDataFill()" disabled title="将上传的实际数据填入模板并生成报告">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              实采数据填充
            </button>
          </div>
        </div>
      </section>

      <!-- 数据预览区 -->
      <section class="preview-section hidden" id="previewSection">
        <h2 class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          数据预览
        </h2>
        <div class="preview-grid">
          <div class="preview-card">
            <h3 class="preview-card-title">基本信息</h3>
            <div class="preview-basic" id="previewBasic"></div>
          </div>
          <div class="preview-card">
            <h3 class="preview-card-title">表格概览</h3>
            <div class="preview-tables" id="previewTables"></div>
          </div>
        </div>
      </section>

      <!-- 操作按钮区 -->
      <div class="action-section hidden" id="actionSection">
        <button class="btn btn-secondary" onclick="resetAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          重置
        </button>
      </div>

      <!-- 进度区 -->
      <section class="progress-section hidden" id="progressSection">
        <div class="progress-steps">
          <div class="progress-step" id="prog1">
            <div class="prog-dot"></div>
            <span>解析数据</span>
          </div>
          <div class="prog-connector" id="progLine1"></div>
          <div class="progress-step" id="prog2">
            <div class="prog-dot"></div>
            <span>匹配模板</span>
          </div>
          <div class="prog-connector" id="progLine2"></div>
          <div class="progress-step" id="prog3">
            <div class="prog-dot"></div>
            <span>填充打包</span>
          </div>
        </div>
        <p class="progress-hint" id="progressHint">正在解析数据文件...</p>
        <p class="task-id" id="taskIdDisplay"></p>
      </section>

      <!-- 结果展示区 -->
      <section class="result-section hidden" id="resultSection">
        <div id="resultContent"></div>
      </section>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
